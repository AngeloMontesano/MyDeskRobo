[env:esp32-s3-mydeskrobo-full]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM5
monitor_port = COM5

lib_ldf_mode = deep+
build_src_filter =
    +<main.cpp>
    +<DeskRoboMVP_nextgen.cpp>
    +<DeskRoboWeb.cpp>
    +<DeskRoboBLE.cpp>
    +<DeskRoboAudio.cpp>
    +<LVGL_Arduino/Display_ST77916.cpp>
    +<LVGL_Arduino/esp_lcd_st77916.c>
    +<LVGL_Arduino/LVGL_Driver.cpp>
    +<LVGL_Arduino/I2C_Driver.cpp>
    +<LVGL_Arduino/TCA9554PWR.cpp>
    +<LVGL_Arduino/Gyro_QMI8658.cpp>
    +<LVGL_Arduino/SD_Card.cpp>
    +<LVGL_Arduino/BAT_Driver.cpp>
    +<../MyDeskRoboEngine/src/LayerRenderer.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=0
    -DDESKROBO_ENABLE_GYRO=1
    -I$PROJECT_DIR/MyDeskRoboEngine/include
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/FS/src
